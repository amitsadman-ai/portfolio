<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Amit Mittelman — Product Designer with 4+ years of experience building solutions that address today's needs while anticipating tomorrow's challenges."
    />
    <title>Amit Mittelman — Product Designer</title>

    <!-- Open Graph — controls the link preview on WhatsApp, iMessage, Slack,
         LinkedIn, Discord, Facebook. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://amittlmanportfolio.netlify.app/" />
    <meta property="og:title" content="Amit Mittelman — Product Designer" />
    <meta
      property="og:description"
      content="Product Designer with 4+ years of experience building solutions that address today's needs while anticipating tomorrow's challenges."
    />
    <meta property="og:image" content="https://amittlmanportfolio.netlify.app/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter card — same content, separate convention. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Amit Mittelman — Product Designer" />
    <meta
      name="twitter:description"
      content="Product Designer with 4+ years of experience building solutions that address today's needs while anticipating tomorrow's challenges."
    />
    <meta name="twitter:image" content="https://amittlmanportfolio.netlify.app/assets/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
