<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
  <!-- top-right blue: vertical long + horizontal short -->
  <rect x="13" y="2"  width="3" height="9" rx="1.5" fill="#36C5F0"/>
  <rect x="13" y="6"  width="9" height="3" rx="1.5" fill="#36C5F0"/>
  <!-- bottom-right green: horizontal long + vertical short -->
  <rect x="13" y="13" width="9" height="3" rx="1.5" fill="#2EB67D"/>
  <rect x="15" y="13" width="3" height="9" rx="1.5" fill="#2EB67D"/>
  <!-- bottom-left yellow: vertical long + horizontal short -->
  <rect x="8"  y="13" width="3" height="9" rx="1.5" fill="#ECB22E"/>
  <rect x="2"  y="15" width="9" height="3" rx="1.5" fill="#ECB22E"/>
  <!-- top-left red: horizontal long + vertical short -->
  <rect x="2"  y="8"  width="9" height="3" rx="1.5" fill="#E01E5A"/>
  <rect x="6"  y="2"  width="3" height="9" rx="1.5" fill="#E01E5A"/>
</svg>
